### Outputting
permalink: /:year/:month/:title.html

### Build settings
markdown: kramdown
highlighter: rouge
plugins: [jekyll-paginate, jekyll-sitemap, jekyll-feed]
url: "https://blog.morefreeze.top"
paginate: 5
paginate_path: /page:num

layout: default
comments: true

kramdown:
  auto_ids:       true
  footnote_nr:    1
  entity_output:  as_char
  toc_levels:     1..6
  smart_quotes:   lsquo,rsquo,ldquo,rdquo
  input:          GFM
  hard_wrap:      false
  footnote_nr:    1

### Exclude files from build
exclude:
  - CLAUDE.md
  - docs/
  - tasks/
  - substack_drafts/
  - node_modules/
  - log/
  - papers/

