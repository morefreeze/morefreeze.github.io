<head>

<meta charset="utf-8">
<meta http-equiv="X-UA-Compatible" content="IE=edge">
<meta name="viewport" content="width=device-width initial-scale=1">

<meta property="og:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
<title>{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}</title>
<meta property="og:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
<meta property="og:url" content="{{ page.url | replace:'index.html','' | prepend: site.url }}">
<meta property="og:site_name" content="{{ site.title }}">
<meta property="og:locale" content="{{ site.locale }}">
<meta name="twitter:card" content="summary">
<meta name="twitter:site" content="@{{ site.twitter_username }}">
<meta name="twitter:creator" content="@{{ site.twitter_username }}">
<meta name="twitter:title" content="{% if page.title %}{{ page.title }}{% else %}{{ site.title }}{% endif %}">
<meta name="twitter:description" content="{% if page.excerpt %}{{ page.excerpt | strip_html | strip_newlines | truncate: 160 }}{% else %}{{ site.description }}{% endif %}">
<meta name="twitter:url" content="{{ page.url | replace:'index.html','' | prepend: site.url }}">

<meta name="keywords" content="{{ site.keywords }}">

<link rel="icon" href="{{site.favicon| prepend:site.baseurl}}">
<link rel="stylesheet" href="{{ "/css/main.css" | prepend: site.baseurl }}">
<link rel="stylesheet" href="{{ "/assets/css/floating-toc.css" | prepend: site.baseurl }}">
<link rel="canonical" href="{{ page.url | replace:'index.html','' |  prepend: site.url }}">
<link rel="alternate" type="application/atom+xml" title="{{ site.title }}" href="{{ "/feed.xml" | prepend: site.url }}" />

<!-- SEO alternate language links (simplified) -->
{% if page.url contains '_en.html' %}
  <!-- English page - link to Chinese version -->
  <link rel="alternate" hreflang="zh" href="{{ page.url | replace:'_en.html','.html' | prepend: site.url }}" />
  <link rel="alternate" hreflang="en" href="{{ site.url }}{{ page.url }}" />
{% elsif page.title contains 'Polymarket' %}
  <!-- Specific case for Polymarket posts since we know they have English versions -->
  <link rel="alternate" hreflang="zh" href="{{ site.url }}{{ page.url }}" />
  <link rel="alternate" hreflang="en" href="{{ page.url | replace:'.html','_en.html' | prepend: site.url }}" />
{% endif %}

<style>
  .language-tag {
    display: inline-block;
    padding: 2px 6px;
    margin-left: 5px;
    font-size: 0.8em;
    border-radius: 4px;
    background-color: #f0f0f0;
    color: #333;
  }

  .zh-tag {
    background-color: #e6f7ff;
    color: #1890ff;
    border: 1px solid #91d5ff;
  }

  .en-tag {
    background-color: #fff7e6;
    color: #fa8c16;
    border: 1px solid #ffd591;
  }
</style>

<script src="https://cdn.mathjax.org/mathjax/latest/MathJax.js?config=TeX-AMS-MML_HTMLorMML"></script>
<!-- Google tag (gtag.js) -->
<script async src="https://www.googletagmanager.com/gtag/js?id=AW-688213545"></script>
<script>
  window.dataLayer = window.dataLayer || [];
  function gtag(){dataLayer.push(arguments);}
  gtag('js', new Date());

  gtag('config', 'AW-688213545');
</script>
<!-- Inline dark mode: apply before render to prevent flash -->
<script>
  (function(){var t=localStorage.getItem('theme')||(window.matchMedia('(prefers-color-scheme: dark)').matches?'dark':'light');document.documentElement.setAttribute('data-theme',t);})();
</script>
</head>
