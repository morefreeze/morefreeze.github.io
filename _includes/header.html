<header class="site-header">

  <div class="wrapper">
    <div style="display: flex; justify-content: space-between; align-items: center;">
      <div>
        <h1 class="site-title"><a href="{{ site.baseurl }}/">{{ site.title }}</a></h1>
        <h3 class="site-meta">{{ site.tagline }}</h3>
      </div>
      
      <!-- 语言切换器 - 移动到右上角 -->
      <div class="language-switcher" style="position: absolute; top: 20px; right: 20px;">
        <button onclick="toggleLanguage()">{% if site.default_locale == 'en' %}中文{% else %}English{% endif %}</button>
      </div>
      
      <script>
        function toggleLanguage() {
          // 获取当前语言设置
          var currentLang = localStorage.getItem('default_locale') || '{{ site.default_locale }}';
          // 切换语言
          var newLang = currentLang === 'en' ? 'cn' : 'en';
          // 保存到localStorage
          localStorage.setItem('default_locale', newLang);
          // 刷新页面以应用新语言设置
          location.reload();
        }
      </script>
    </div>
    
    <script>
      // 设置默认语言的函数
      function switchDefaultLocale(locale) {
        localStorage.setItem('default_locale', locale);
      }
      
      // 检查无翻译版本的点击事件
      document.addEventListener('DOMContentLoaded', function() {
        const noTranslationLinks = document.querySelectorAll('.no-translation');
        noTranslationLinks.forEach(link => {
          link.addEventListener('click', function(e) {
            e.preventDefault();
            const isChinese = link.textContent.includes('无中文版本');
            alert(isChinese ? '此页面暂无中文版本，5秒后将返回当前页面' : 'No English version available, returning to current page in 5 seconds');
            setTimeout(function() {
              window.location.reload();
            }, 5000);
          });
        });
      });
    </script>

    <nav class="site-nav">
      <a href="#" class="menu-icon">
        <svg viewBox="0 0 18 15">
          <path fill="#424242" d="M18,1.484c0,0.82-0.665,1.484-1.484,1.484H1.484C0.665,2.969,0,2.304,0,1.484l0,0C0,0.665,0.665,0,1.484,0 h15.031C17.335,0,18,0.665,18,1.484L18,1.484z"/>
          <path fill="#424242" d="M18,7.516C18,8.335,17.335,9,16.516,9H1.484C0.665,9,0,8.335,0,7.516l0,0c0-0.82,0.665-1.484,1.484-1.484 h15.031C17.335,6.031,18,6.696,18,7.516L18,7.516z"/>
          <path fill="#424242" d="M18,13.516C18,14.335,17.335,15,16.516,15H1.484C0.665,15,0,14.335,0,13.516l0,0 c0-0.82,0.665-1.484,1.484-1.484h15.031C17.335,12.031,18,12.696,18,13.516L18,13.516z"/>
        </svg>
      </a>
      <div class="trigger">
        {% for page in site.pages %}
        {% if page.title %}
        <a class="page-link" href="{{ page.url | prepend: site.baseurl }}">{{ page.title }}</a>
        {% endif %}
        {% endfor %}
      </div>
    </nav>

  </div>

</header>
