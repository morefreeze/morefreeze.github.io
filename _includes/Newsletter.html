<div class="sidebar-module newsletter">
  <h4>订阅更新</h4>
  <p style="font-size: 13px; color: #666; margin-bottom: 10px;">新文章发布时通过邮件通知你，不定期更新，无垃圾邮件。</p>
  <form
    action="https://morefreeze.substack.com/api/v1/free?nojs=true"
    method="post"
    target="popupwindow"
    onsubmit="window.open('https://morefreeze.substack.com', 'popupwindow')"
    class="newsletter-form"
  >
    <input type="email" name="email" placeholder="your@email.com" required style="width: 100%; padding: 8px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 8px; font-size: 14px;" />
    <input type="submit" value="订阅" style="width: 100%; padding: 8px; background: #ff6719; color: #fff; border: none; border-radius: 4px; cursor: pointer; font-size: 14px;" />
  </form>
</div>
