    <!-- Row 6: W W U U U V -->
    <rect x="0"   y="228" width="40" height="38" class="cell" style="fill:#fc8181"/>
    <text x="20"  y="247" class="label">W</text>
    <rect x="40"  y="228" width="40" height="38" class="cell" style="fill:#fc8181"/>
    <text x="60"  y="247" class="label">W</text>
    <rect x="80"  y="228" width="40" height="38" class="cell" style="fill:#fbd38d"/>
    <text x="100" y="247" class="label">U</text>
    <rect x="120" y="228" width="40" height="38" class="cell" style="fill:#fbd38d"/>
    <text x="140" y="247" class="label">U</text>
    <rect x="160" y="228" width="40" height="38" class="cell" style="fill:#fbd38d"/>
    <text x="180" y="247" class="label">U</text>
    <rect x="200" y="228" width="40" height="38" class="cell" style="fill:#63b3ed"/>
